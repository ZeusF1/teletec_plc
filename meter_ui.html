function parseBulkAddresses() {
    var ta = document.getElementById('bulkAddressInput');
    if (!ta) return;
    var text = ta.value.trim();
    if (!text) return;

    // Build list of all known addresses from queue data
    var allMeters = [];
    if (_queueData) {
        [].concat(_queueData.pending||[], _queueData.idle||[], _queueData.disabled||[]).forEach(function(m) {
            allMeters.push(String(m.address));
        });
    }

    // Parse input: support wildcards (2506*), exact numbers, ranges (optional)
    var tokens = text.split(/[\s,;\n\r]+/).filter(Boolean);
    var matchedAddrs = {};
    var wildcards = [];
    var exactNums = [];

    tokens.forEach(function(tok) {
        // Remove _ prefix
        tok = tok.replace(/^_+/, '');
        if (!tok) return;

        if (tok.indexOf('*') !== -1 || tok.indexOf('?') !== -1) {
            // Wildcard pattern: convert to regex
            var pattern = '^' + tok.replace(/\*/g, '.*').replace(/\?/g, '.') + '$';
            wildcards.push(pattern);
            var re = new RegExp(pattern);
            allMeters.forEach(function(addr) {
                if (re.test(addr)) matchedAddrs[addr] = true;
            });
        } else if (/^\d{5,}$/.test(tok)) {
            // Exact address
            exactNums.push(tok);
            matchedAddrs[String(parseInt(tok, 10))] = true;
        }
    });

    var addrs = Object.keys(matchedAddrs);
    if (addrs.length === 0) {
        var div = document.getElementById('queueActionResult');
        var msg = '\u26A0 Не знайдено жодної адреси';
        if (wildcards.length > 0) msg += ' за маскою "' + tokens.join(', ') + '"';
        else msg += ' (потрібні числа від 5 цифр або маска з *)';
        if (div) div.innerHTML = '<span style="color:#e67e22">' + msg + '</span>';
        return;
    }

    // Select matched addresses
    var found = 0, notInQueue = 0;
    var knownSet = {};
    allMeters.forEach(function(a) { knownSet[a] = true; });

    addrs.forEach(function(a) {
        _queueSelected[a] = true;
        if (knownSet[a]) found++;
        else notInQueue++;
    });

    var div = document.getElementById('queueActionResult');
    var msg = '\u2705 Вибрано ' + addrs.length + ' адрес';
    if (wildcards.length > 0) msg += ' (маска: ' + tokens.filter(function(t){return t.indexOf('*')!==-1||t.indexOf('?')!==-1}).join(', ') + ')';
    if (notInQueue > 0) msg += ' | ' + notInQueue + ' не в черзі';
    if (div) div.innerHTML = '<span style="color:#27ae60">' + msg + '</span>';

    reRenderQueue();
}

            html += '<button class="btn-sm" onclick="applyBulkPreset([' + pr.flags.join(',') + '])" title="' + pr.desc + '" ';
            html += 'style="background:#eef2f7;border:1px solid #c0cfe0;font-size:12px">' + pr.name + '</button>';
        }
        html += '</div></div>';
        html += '<hr style="border:none;border-top:1px solid #eee;margin:0 0 14px">';
    }

    // Task checkboxes with descriptions — grouped
    var groups = { basic: 'Основні', archive: 'Архівні', service: 'Сервісні' };
    var lastGroup = '';
    for (var i = 0; i < TASK_DEFS.length; i++) {
        var t = TASK_DEFS[i];
        if (t.group !== lastGroup) {
            if (lastGroup) html += '</div>';

    html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid #eee">';
    html += '<button class="btn-sm" onclick="closeBulkDialog()" style="padding:8px 16px">Скасувати</button>';

    html += '</div>';
    html += '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
}

function setStartDatePreset(preset) {
    var dateInput = document.getElementById('schedStartDate');
    if (!dateInput) return;
    var now = new Date();
    var d;
    switch (preset) {
        case 'today':
            d = now;
            break;
        case 'month':
            d = new Date(now.getFullYear(), now.getMonth(), 1);
            break;
        case '60d':
            d = new Date(now.getTime() - 60 * 24 * 3600 * 1000);
            break;
        case 'year':
            d = new Date(now.getFullYear(), 0, 1);
            break;
        case 'lastyear':
            d = new Date(now.getFullYear() - 1, 0, 1);
            break;
        default:
            d = now;
    }
    dateInput.value = d.toISOString().substring(0, 10);
}

/** Direct archive read — auto-splits into weekly chunks for LP */
var _directReadAbort = null;

function directArchiveRead() {
    var serial = _selectedMeterSerial;
    if (!serial) {
        var div = document.getElementById('directReadResult');
        if (div) div.innerHTML = '<span style="color:#c0392b">\u274C \u0421\u0435\u0440\u0456\u0439\u043D\u0438\u0439 \u043D\u043E\u043C\u0435\u0440 \u043D\u0435 \u0437\u043D\u0430\u0439\u0434\u0435\u043D\u043E. \u041D\u0430\u0442\u0438\u0441\u043D\u0456\u0442\u044C "\u0417\u0430\u0432\u0430\u043D\u0442\u0430\u0436\u0438\u0442\u0438" \u0441\u043F\u043E\u0447\u0430\u0442\u043A\u0443.</span>';
        return;
    }

    var type = document.getElementById('directReadType').value;
    var dir = document.getElementById('directReadDir').value;
    var dateFrom = document.getElementById('directReadFrom').value;
    var dateTo = document.getElementById('directReadTo').value;
    var save = document.getElementById('directReadSave').checked ? 1 : 0;
    var div = document.getElementById('directReadResult');

    if (type === 'energy') {
        // Single request, no dates
        doSingleArchiveRequest(serial, type, null, null, save, div, dir);
        return;
    }

    if (!dateFrom) dateFrom = dateTo || new Date().toISOString().substring(0,10);
    if (!dateTo) dateTo = dateFrom;

    // Split into chunks: LP = 3 days max, MR = 14 days max per request
    var chunkSize = (type === 'lp') ? 3 : 14;
    var chunks = [];
    var from = new Date(dateFrom);
    var to = new Date(dateTo);

    while (from <= to) {
        var chunkEnd = new Date(Math.min(from.getTime() + (chunkSize - 1) * 86400000, to.getTime()));
        chunks.push({ from: from.toISOString().substring(0,10), to: chunkEnd.toISOString().substring(0,10) });
        from = new Date(chunkEnd.getTime() + 86400000);
    }

    var totalDays = Math.ceil((to.getTime() - new Date(dateFrom).getTime()) / 86400000) + 1;
    _directReadAbort = false;

    div.innerHTML = '<span style="color:#2980b9">\u23F3 ' + type.toUpperCase() + ': ' + totalDays + ' днів в ' + chunks.length + ' частинах...</span>' +
        ' <button class="btn-sm" onclick="_directReadAbort=true" style="font-size:11px;color:#c0392b">\u2715 Стоп</button>' +
        '<div id="directReadLog" style="margin-top:6px;font-size:11px;color:#555;max-height:120px;overflow-y:auto;border:1px solid #ddd;padding:4px;background:#fafafa;font-family:monospace"></div>';

    var totalRecords = 0, totalSaved = 0, totalErrors = 0;
    var startTime = new Date();
    var _drTimerEl = null;
    var _drLogEl = document.getElementById('directReadLog');

    function fmtElapsed() {
        var sec = Math.floor((new Date() - startTime) / 1000);
        return Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0');
    }
    function drLog(msg) {
        if (!_drLogEl) _drLogEl = document.getElementById('directReadLog');
        if (_drLogEl) {
            _drLogEl.innerHTML += '<div>' + fmtElapsed() + ' ' + msg + '</div>';
            _drLogEl.scrollTop = _drLogEl.scrollHeight;
        }
    }

    // Live timer — updates every second
    var _drTimer = setInterval(function() {
        if (!_drTimerEl) _drTimerEl = document.getElementById('drTimerVal');
        if (_drTimerEl) _drTimerEl.textContent = fmtElapsed();
    }, 1000);

    drLog('▶ Старт: ' + chunks.length + ' частин, ' + totalDays + ' днів');

    // Process chunks sequentially
    function processChunk(idx) {
        if (idx >= chunks.length || _directReadAbort) {
            clearInterval(_drTimer);
            var msg = '✅ Готово! ' + totalRecords + ' записів за ' + fmtElapsed();
            if (totalSaved > 0) msg += ' | Збережено: ' + totalSaved;
            if (totalErrors > 0) msg += ' | Помилок: ' + totalErrors;
            if (_directReadAbort) msg = '⚠ Зупинено. ' + msg;
            drLog(msg);
            var logHtml = _drLogEl ? _drLogEl.outerHTML : '';
            div.innerHTML = '<span style="color:' + (totalRecords > 0 ? '#27ae60' : '#e67e22') + ';font-weight:600">' + msg + '</span>' + logHtml;
            _directReadAbort = null;
            setTimeout(function() { document.getElementById('btnLoad').click(); }, 1500);
            return;
        }

        var c = chunks[idx];
        var chunkLabel = 'Частина ' + (idx+1) + '/' + chunks.length + ': ' + c.from + ' — ' + c.to;
        drLog('📡 ' + chunkLabel + '...');

        // Update header with live timer
        var headerEl = div.querySelector('.dr-header');
        if (!headerEl) {
            div.innerHTML = '<div class="dr-header"><span style="color:#2980b9">\u23F3 ' + chunkLabel +
                ' [<span id="drTimerVal">' + fmtElapsed() + '</span>]</span>' +
                ' <button class="btn-sm" onclick="_directReadAbort=true" style="font-size:11px;color:#c0392b">\u2715 Стоп</button></div>' +
                (_drLogEl ? _drLogEl.outerHTML : '');
            _drTimerEl = document.getElementById('drTimerVal');
            _drLogEl = document.getElementById('directReadLog');
        } else {
            headerEl.innerHTML = '<span style="color:#2980b9">\u23F3 ' + chunkLabel +
                ' [<span id="drTimerVal">' + fmtElapsed() + '</span>]</span>' +
                ' <button class="btn-sm" onclick="_directReadAbort=true" style="font-size:11px;color:#c0392b">\u2715 Стоп</button>';
            _drTimerEl = document.getElementById('drTimerVal');
        }

        var url = 'meter_archive.php?serial=' + encodeURIComponent(serial) + '&type=' + type + '&dir=' + encodeURIComponent(dir) + '&save=' + save +
            '&date_from=' + c.from + '&date_to=' + c.to;

        fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok) {
                totalRecords += data.count || 0;
                totalSaved += data.saved || 0;
                drLog('✅ ' + c.from + '…' + c.to + ': ' + (data.count||0) + ' зап. (' + (data.elapsed||'?') + 'с)' + (data.saved ? ', збер: '+data.saved : ''));
            } else {
                totalErrors++;
                drLog('❌ ' + c.from + '…' + c.to + ': ' + (data.error||'помилка'));
            }
            processChunk(idx + 1);
        })
        .catch(function(e) {
            totalErrors++;
            drLog('❌ ' + c.from + '…' + c.to + ': ' + e.message);
            processChunk(idx + 1);
        });
    }

    processChunk(0);
}

/** Single archive request (for energy or single date) */
function doSingleArchiveRequest(serial, type, dateFrom, dateTo, save, div, dir) {
    var url = 'meter_archive.php?serial=' + encodeURIComponent(serial) + '&type=' + type + '&save=' + save;
    if (dir) url += '&dir=' + encodeURIComponent(dir);
    if (dateFrom && dateTo) url += '&date_from=' + dateFrom + '&date_to=' + dateTo;
    else if (dateFrom) url += '&date=' + dateFrom;

    var t0 = new Date();
    div.innerHTML = '<span style="color:#2980b9">\u23F3 Зчитування... [<span id="drTimerVal">0:00</span>]</span>';
    var _singleTimer = setInterval(function() {
        var el = document.getElementById('drTimerVal');
        if (el) { var s = Math.floor((new Date()-t0)/1000); el.textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
    }, 1000);

    fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
        clearInterval(_singleTimer);
        if (data.ok) {
            var msg = '✅ Зчитано: ' + data.count + ' за ' + data.elapsed + 'с';
            if (data.saved) msg += ' | Збережено: ' + data.saved;
            div.innerHTML = '<span style="color:#27ae60">' + msg + '</span>';
        } else {
            div.innerHTML = '<span style="color:#c0392b">❌ ' + (data.error || 'error') + '</span>';
        }
    })
    .catch(function(e) {
        clearInterval(_singleTimer);
        div.innerHTML = '<span style="color:#c0392b">❌ ' + e.message + '</span>';
    });
}

        html += '<button class="btn-sm" onclick="bulkRequestRead(16)">Ms (виміри)</button>';

        html += '</div>';

    }

    html += '<div class="scroll-wrap"><table class="result-table"><thead><tr>';
    html += '<th></th><th>Адреса</th><th>Серійний номер</th><th>Тип</th><th>Задачі</th><th>Останній зв\'язок</th>';
    html += '</tr></thead><tbody>';

    list.forEach(function(m) {
        var online = m.schedule && new Date(m.schedule) > cutoff;
        var tasks = m.tasks || [];
        html += '<tr>';
        html += '<td>' + (online ? '\u2705' : '\u26AA') + '</td>';
        html += '<td>' + m.address + '</td>';
        html += '<td style="font-family:monospace;font-size:12px">' + m.serial + '</td>';
        html += '<td>' + m.type + '</td>';

        if (tasks.length) {

        } else {
            html += '<span style="color:#ccc">-</span>';
        }
        html += '</td>';
        html += '<td class="' + (online ? 'meter-online' : 'meter-offline') + '">' + (m.schedule || '-') + '</td>';
        html += '</tr>';
    });

    html += '</tbody></table></div>';
    body.innerHTML = html;
}

// --- Load all available period for halfhour chart ---
function loadAllPeriod() {
    var addr = document.getElementById('selMeter').value;
    if (!addr) return;

    // Fetch schedule to get first/last archivo_mhora dates
    fetch(LIST_API + '?cmd=schedule&addr=' + addr)
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.error) { alert(data.error); return; }
        var da = data.data_available;
        if (!da || !da.archivo_mhora || !da.archivo_mhora.first) {
            alert('Немає даних 30-хв профілю для цього лічильника.\nСпочатку зчитайте LP (Load Profile).');
            return;
        }
        var first = da.archivo_mhora.first; // e.g. "2026-03-01"
        var last = da.archivo_mhora.last || first;

        // Calculate days between first and last
        var d1 = new Date(first.substring(0, 10));
        var d2 = new Date(last.substring(0, 10));
        var days = Math.ceil((d2 - d1) / (24*60*60*1000)) + 1;
        if (days < 1) days = 1;

        // Set filters
        document.getElementById('inDate').value = first.substring(0, 10);
        document.getElementById('inDays').value = days;

        // Load
        document.getElementById('btnLoad').click();
    })
    .catch(function(e) { alert(e.message); });
}

// --- Quick chart: switch to halfhour tab with smart date range ---
function quickChart(hours) {
    var sel = document.getElementById('selMeter');
    var addr = sel.value;
    if (!addr) return;

    // Calculate start date (go back `hours` from now)
    var now = new Date();
    var start = new Date(now.getTime() - hours * 60 * 60 * 1000);
    var days = Math.ceil((now - start) / (24*60*60*1000)) + 1;

    var y = start.getFullYear();
    var m = String(start.getMonth() + 1).padStart(2, '0');
    var d = String(start.getDate()).padStart(2, '0');
    document.getElementById('inDate').value = y + '-' + m + '-' + d;
    document.getElementById('inDays').value = days;

    // Switch to halfhour tab
    var tabs = document.querySelectorAll('.tab');
    tabs.forEach(function(t) { t.classList.remove('active'); });
    document.querySelector('.tab[data-cmd="halfhour"]').classList.add('active');

    // Stop queue timer if running
    if (currentCmd === 'queue' && _queueTimer) {
        clearInterval(_queueTimer);
        _queueTimer = null;
    }
    currentCmd = 'halfhour';
    updateFilters();

    // Restore selected meter
    selectMeter(addr);

    // Trigger load
    document.getElementById('btnLoad').click();
}

// ====== Real-time monitoring ======
function monitorBarHtml() {
    if (!_monitorActive) return '';
    var h = '<div class="monitor-bar">';
    h += '<div class="pulse"></div>';
    h += '<span style="font-weight:600">LIVE</span>';
    h += '<span class="mon-elapsed" id="monitorElapsed">' + monitorElapsed() + '</span>';
    h += '<span class="mon-dim">| #' + _monitorCount + '</span>';
    if (_monitorLastFecha) {
        h += '<span class="mon-dim">| Дані: <b style="color:#7bed9f">' + _monitorLastFecha + '</b></span>';
    }
    h += '<button class="btn-action" onclick="monitorPrioritize()" style="margin-left:auto;padding:3px 10px;font-size:11px;background:rgba(231,76,60,0.8);color:#fff;border-color:rgba(255,255,255,0.3)" title="Очистити чергу інших — PollReader обробить цей першим">🚀 Пріоритет</button>';
    h += '<button class="btn-action" onclick="stopMonitor()" style="padding:3px 10px;font-size:11px;background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.3)">⏹ Стоп</button>';
    h += '<div class="mon-status" id="monitorStatus">' + (_monitorStatus || 'Ініціалізація...') + '</div>';
    h += '</div>';
    return h;
}

function setMonitorStatus(txt) {
    _monitorStatus = txt;
    var el = document.getElementById('monitorStatus');
    if (el) el.innerHTML = txt;
}

function monitorElapsed() {
    if (!_monitorStart) return '00:00';
    var sec = Math.floor((new Date() - _monitorStart) / 1000);
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function toggleMonitor() {
    if (_monitorActive) {
        stopMonitor();
    } else {
        startMonitor();
    }
}

function startMonitor() {
    var addr = document.getElementById('selMeter').value;
    if (!addr) return;

    _monitorActive = true;
    _monitorAddr = addr;
    _monitorStart = new Date();
    _monitorCount = 0;
    _monitorStatus = '';
    _monitorLastFecha = null;

    // Immediate: request fresh Ms + refresh display
    monitorRequest();
    monitorRefresh();

    // Request new Ms every 30s
    _monitorRequestTimer = setInterval(monitorRequest, 30000);
    // Refresh display every 10s
    _monitorTimer = setInterval(monitorRefresh, 10000);
    // Update elapsed clock every 1s
    _monitorElapsedTimer = setInterval(function() {
        var el = document.getElementById('monitorElapsed');
        if (el) el.textContent = monitorElapsed();
    }, 1000);
}

function stopMonitor() {
    _monitorActive = false;
    _monitorAddr = null;
    _monitorStart = null;
    _monitorCount = 0;
    _monitorStatus = '';
    _monitorLastFecha = null;
    if (_monitorTimer) { clearInterval(_monitorTimer); _monitorTimer = null; }
    if (_monitorRequestTimer) { clearInterval(_monitorRequestTimer); _monitorRequestTimer = null; }
    if (_monitorElapsedTimer) { clearInterval(_monitorElapsedTimer); _monitorElapsedTimer = null; }

    // Re-render to remove monitor bar
    if (currentCmd === 'current') {
        var addr = document.getElementById('selMeter').value;
        if (addr) {
            loadCurrent(addr).then(function(data) {
                renderCurrent(data, document.getElementById('resultHeader'), document.getElementById('resultBody'));
            });
        }
    }
}

function monitorRequest() {
    if (!_monitorActive) return;
    var addr = _monitorAddr || document.getElementById('selMeter').value;
    if (!addr) return;
    setMonitorStatus('📡 Запит Ms...');
    // Request Ms (measurements) flag=0x10
    fetch(LIST_API + '?cmd=request_read&addr=' + addr + '&flags=16')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!_monitorActive) return;
        if (data.error) {
            setMonitorStatus('❌ ' + data.error);
        } else {
            setMonitorStatus('✅ Ms → чергу. Очікування PollReader...');
        }
    })
    .catch(function(e) {
        console.error('monitor request:', e);
        if (_monitorActive) setMonitorStatus('❌ ' + e.message);
    });
}

function monitorPrioritize() {
    var addr = _monitorAddr || document.getElementById('selMeter').value;
    if (!addr) return;
    setMonitorStatus('🚀 Встановлення пріоритету...');

    fetch(LIST_API + '?cmd=prioritize&addr=' + addr + '&flags=16')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.error) {
            setMonitorStatus('❌ ' + data.error);
        } else {
            setMonitorStatus('🚀 Пріоритет! Очищено чергу ' + data.cleared + ' лічильників. Ms → PollReader.');
            // Send fresh Ms request immediately
            monitorRequest();
        }
    })
    .catch(function(e) {
        setMonitorStatus('❌ ' + e.message);
    });
}

function monitorRefresh() {
    if (!_monitorActive || currentCmd !== 'current') {
        stopMonitor();
        return;
    }
    var addr = _monitorAddr || document.getElementById('selMeter').value;
    if (!addr) { stopMonitor(); return; }

    // Check if user changed meter
    var selAddr = document.getElementById('selMeter').value;
    if (selAddr !== _monitorAddr) {
        stopMonitor();
        return;
    }

    _monitorCount++;

    // Fetch current data + queue status in parallel
    var pData = loadCurrent(addr);
    var pQueue = fetch(LIST_API + '?cmd=schedule&addr=' + addr).then(function(r) { return r.json(); });

    Promise.all([pData, pQueue]).then(function(results) {
        if (!_monitorActive) return;
        var data = results[0];
        var sched = results[1];

        // Check queue status
        var queueInfo = '';
        if (sched && sched.schedule) {
            var flags = sched.schedule.rmflags;
            var hasMsPending = (flags & 0x10) !== 0;
            var lastRun = sched.schedule.lastRun || '-';
            if (hasMsPending) {
                queueInfo = '🔴 Ms в черзі (0x' + flags.toString(16).toUpperCase() + '). LastRun: ' + lastRun;
            } else {
                queueInfo = '🟢 Ms оброблено. LastRun: ' + lastRun;
            }
        }

        // Check data
        var rows = data.raw || [];
        var newFecha = rows.length ? rows[rows.length - 1].fecha : null;
        var dataInfo = '';
        if (newFecha && newFecha !== _monitorLastFecha) {
            _monitorLastFecha = newFecha;
            dataInfo = '🔄 Нові дані!';
        } else if (!newFecha) {
            dataInfo = '⏳ Немає даних в БД';
        } else {
            dataInfo = '⏳ Без змін';
        }

        setMonitorStatus(queueInfo + ' · ' + dataInfo);
        renderCurrent(data, document.getElementById('resultHeader'), document.getElementById('resultBody'));
    }).catch(function(e) {
        console.error('monitor refresh:', e);
        if (_monitorActive) setMonitorStatus('❌ ' + e.message);
    });
}

// ====== Instant read (direct PLC) ======
var _instantSSE = null;  // EventSource for SSE mode

function toggleInstantRepeat() {
    if (_instantRepeat) {
        // Stop continuous mode — cancelInstant() handles UI update
        cancelInstant();
    } else {
        // Start continuous mode via SSE
        _instantRepeat = true;
        _instantHistory = [];
        _instantCycleNum = 0;
        startInstantSSE();
    }
}

function startInstantSSE() {
    var addr = document.getElementById('selMeter').value;
    if (!addr) return;
    var mInfo = getMeterInfo(addr);
    if (!mInfo) return;
    if (_monitorActive) stopMonitor();

    // Cleanup previous SSE/abort/timer WITHOUT resetting _instantRepeat
    // (cancelInstant() would set _instantRepeat=false, breaking reconnect logic)
    if (_instantSSE) { _instantSSE.close(); _instantSSE = null; }
    if (_instantAbort) { _instantAbort.abort(); _instantAbort = null; }
    if (_instantTimer) { clearInterval(_instantTimer); _instantTimer = null; }

    _instantLoading = true;
    // Don't reset _instantCycleNum here — keep running total across reconnects

    var header = document.getElementById('resultHeader');
    var body = document.getElementById('resultBody');
    var panel = document.getElementById('resultPanel');
    panel.style.display = '';
    header.textContent = '\u26A1 \u0411\u0435\u0437\u043F\u0435\u0440\u0435\u0440\u0432\u043D\u0435 \u0437\u0447\u0438\u0442\u0443\u0432\u0430\u043D\u043D\u044F: ' + (mInfo.serial || addr) + ' (' + mInfo.type + ')';

    var startTime = new Date();

    // Show loading with last data if available
    showInstantLoading(body, mInfo, startTime);

    // Timer
    _instantTimer = setInterval(function() {
        var el = document.getElementById('instantTimerDisplay');
        if (!el) return;
        var sec = Math.floor((new Date() - startTime) / 1000);
        var m = Math.floor(sec / 60), s = sec % 60;
        el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }, 1000);

    // SSE connection — PHP loops server-side in batches of 30 cycles
    // After batch ends, frontend reconnects for next batch (frees php-fpm worker between batches)
    var url = 'meter_instant.php?serial=' + encodeURIComponent(mInfo.serial) + '&stream=30';
    _instantSSE = new EventSource(url);

    _instantSSE.onmessage = function(ev) {
        try {
            var data = JSON.parse(ev.data);
        } catch(e) { return; }

        // Handle "busy" error — another instant read is running
        if (data.error === 'busy') {
            dbgInstant('Server busy, retry in 10s...');
            showInstantLoading(body, mInfo, startTime, '⏳ ' + (data.message || 'Зайнято, очікування...'));
            // Don't increment cycle, don't add to history
            return;
        }

        // Running total across reconnects (don't use PHP's per-connection cycle)
        _instantCycleNum++;

        if (data.ok) {
            _instantHistory.push({ data: data, time: new Date(), cycle: _instantCycleNum });
        }

        // Reset timer for next cycle
        startTime = new Date();

        // Update display: full cards for latest + history
        header.textContent = '\u26A1 \u0411\u0435\u0437\u043F\u0435\u0440\u0435\u0440\u0432\u043D\u0435: ' + (mInfo.serial || addr) + ' (\u0446\u0438\u043A\u043B #' + _instantCycleNum + ')';

        if (data.ok) {
            renderInstantLive(data, body, mInfo, startTime);
        } else {
            // Show error but keep last good data
            showInstantLoading(body, mInfo, startTime, '\u274C ' + (data.error || 'error') + ' (' + (data.elapsed||'?') + '\u0441)');
        }
    };

    _instantSSE.addEventListener('done', function(ev) {
        dbgInstant('SSE batch done');
        if (_instantSSE) { _instantSSE.close(); _instantSSE = null; }
        // Batch finished — start next batch if continuous mode active
        if (_instantRepeat) {
            dbgInstant('Starting next SSE batch in 2s...');
            setTimeout(function() {
                if (_instantRepeat) startInstantSSE();
            }, 2000);
        } else {
            cancelInstant();
        }
    });

    _instantSSE.onerror = function() {
        if (!_instantRepeat) return;
        dbgInstant('SSE error/closed, reconnecting in 5s...');
        if (_instantSSE) { _instantSSE.close(); _instantSSE = null; }
        // Auto-reconnect with longer delay to let php-fpm worker free up
        setTimeout(function() {
            if (_instantRepeat) startInstantSSE();
        }, 5000);
    };
}

    _instantTimer = setInterval(function() {
        var el = document.getElementById('instantTimerDisplay');
        if (!el) { clearInterval(_instantTimer); _instantTimer = null; return; }
        var sec = Math.floor((new Date() - startTime) / 1000);
        var m = Math.floor(sec / 60), s = sec % 60;
        el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }, 1000);

    fetch('meter_instant.php?serial=' + encodeURIComponent(mInfo.serial), {
        signal: _instantAbort.signal
    })
    .then(function(r) {
        return r.text().then(function(txt) {
            try {
                var idx = txt.indexOf('{');
                if (idx < 0) throw new Error(txt.substring(0, 500) || 'Empty response');
                return JSON.parse(txt.substring(idx));
            } catch(e) {
                return { error: 'PHP error', output: txt.substring(0, 1000) };
            }
        });
    })
    .then(function(data) {
        if (_instantTimer) { clearInterval(_instantTimer); _instantTimer = null; }
        _instantLoading = false;
        _instantAbort = null;

        if (data.ok) {
            _instantHistory.push({ data: data, time: new Date(), cycle: 1 });
            renderInstant(data, header, body);
        } else {
            header.textContent = '\u26A1 \u041F\u043E\u043C\u0438\u043B\u043A\u0430';
            var errHtml = '<div style="padding:20px;color:#c0392b;background:#fdf0ef;border-radius:6px">';
            errHtml += '<div style="font-size:14px;font-weight:600;margin-bottom:8px">\u274C ' + (data.error || 'Unknown error') + '</div>';
            if (data.output) errHtml += '<pre style="font-size:11px;color:#666;white-space:pre-wrap;max-height:200px;overflow:auto">' + escHtml(data.output) + '</pre>';
            if (data.elapsed) errHtml += '<div style="font-size:12px;color:#888;margin-top:8px">\u0427\u0430\u0441: ' + data.elapsed + '\u0441</div>';
            if (data.plc_output) errHtml += '<details style="margin-top:8px"><summary style="font-size:11px;color:#999;cursor:pointer">PLC output</summary><pre style="font-size:10px;color:#666;white-space:pre-wrap">' + escHtml(data.plc_output) + '</pre></details>';
            errHtml += '</div>';
            body.innerHTML = actionsBarHtml() + errHtml;
        }
    })
    .catch(function(e) {
        if (_instantTimer) { clearInterval(_instantTimer); _instantTimer = null; }
        _instantLoading = false;
        _instantAbort = null;

        if (e.name === 'AbortError') {
            body.innerHTML = actionsBarHtml() +
                '<div style="padding:30px;text-align:center;color:#888;font-size:14px">\u274C \u0417\u0430\u043F\u0438\u0442 \u0441\u043A\u0430\u0441\u043E\u0432\u0430\u043D\u043E.</div>' +
                renderInstantHistory();
        } else {
            body.innerHTML = actionsBarHtml() +
                '<div style="padding:20px;color:#c0392b">\u274C ' + e.message + '</div>' +
                renderInstantHistory();
        }
    });
}

function cancelInstant() {
    _instantRepeat = false;
    if (_instantSSE) {
        _instantSSE.close();
        _instantSSE = null;
    }
    if (_instantAbort) {
        _instantAbort.abort();
        _instantAbort = null;
    }
    if (_instantTimer) {
        clearInterval(_instantTimer);
        _instantTimer = null;
    }
    _instantLoading = false;

    // Update UI: show last result or hide panel
    var header = document.getElementById('resultHeader');
    var body = document.getElementById('resultBody');
    var panel = document.getElementById('resultPanel');
    if (header && body) {
        if (_instantHistory.length > 0) {
            // Show last reading with history
            var last = _instantHistory[_instantHistory.length - 1].data;
            header.textContent = '⚡ Зупинено після ' + _instantHistory.length + ' зчитувань';
            renderInstant(last, header, body);
        } else {
            // No data was received — hide panel
            if (panel) panel.style.display = 'none';
        }
    }
    // Re-render action bar to reset button states
    var ab = document.querySelector('.actions-bar');
    if (ab) ab.outerHTML = actionsBarHtml();
}

/** Render compact history of all instant readings */
function renderInstantHistory() {
    if (_instantHistory.length === 0) return '';
    var h = '<div class="instant-history">';
    h += '<h4>\uD83D\uDCCA \u0406\u0441\u0442\u043E\u0440\u0456\u044F \u0437\u0447\u0438\u0442\u0443\u0432\u0430\u043D\u044C (' + _instantHistory.length + ')</h4>';
    // Most recent first
    for (var i = _instantHistory.length - 1; i >= 0; i--) {
        var item = _instantHistory[i];
        var d = item.data;
        var t = item.time;
        var timeStr = String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0') + ':' + String(t.getSeconds()).padStart(2,'0');
        h += '<div class="ih-row">';
        h += '<span class="ih-num">#' + item.cycle + '</span>';
        h += '<span class="ih-time">' + timeStr + '</span>';
        h += '<span class="ih-vals">';
        // Voltage
        if (d.voltage) {
            var vKeys = Object.keys(d.voltage);
            for (var vi = 0; vi < vKeys.length; vi++) {
                h += '<span class="ih-v">U' + vKeys[vi] + '=<b>' + d.voltage[vKeys[vi]] + '</b>V</span>';
            }
        }
        // Current
        if (d.current) {
            var cKeys = ['A','B','C','N'];
            for (var ci = 0; ci < cKeys.length; ci++) {
                if (d.current[cKeys[ci]] !== undefined) {
                    h += '<span class="ih-v">I' + cKeys[ci] + '=<b>' + d.current[cKeys[ci]] + '</b>A</span>';
                }
            }
        }
        // Power
        if (d.power_active) {
            var pKeys = Object.keys(d.power_active);
            for (var pi = 0; pi < pKeys.length; pi++) {
                h += '<span class="ih-v">P' + pKeys[pi] + '=<b>' + d.power_active[pKeys[pi]] + '</b>kW</span>';
            }
        }
        // Frequency & temperature
        if (d.frequency) h += '<span class="ih-v">f=<b>' + d.frequency + '</b>Hz</span>';
        if (d.temperature !== undefined) h += '<span class="ih-v">T=<b>' + d.temperature + '</b>\u00B0C</span>';
        h += '</span>';
        h += '</div>';
    }
    h += '</div>';
    return h;
}

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

/** Generate cards HTML for instant read data (reusable) */
function renderInstantCards(d) {
    var html = '<div class="cards">';
    var isMtx3 = d.type && d.type.indexOf('MTX3') >= 0;

    // Voltage
    if (d.voltage) {
        if (isMtx3) {
            html += cardHtml('\u041D\u0430\u043F\u0440\u0443\u0433\u0430, V', {
                'A': d.voltage.A + ' V',
                'B': d.voltage.B + ' V',
                'C': d.voltage.C + ' V'
            });
        } else {
            html += cardHtml('\u041D\u0430\u043F\u0440\u0443\u0433\u0430, V', {
                'U(AB)': d.voltage.AB + ' V'
            });
        }
    }

    // Current
    if (d.current) {
        if (isMtx3) {
            var cur = {
                'A': d.current.A + ' A',
                'B': d.current.B + ' A',
                'C': d.current.C + ' A'
            };
            if (d.current.N !== undefined) cur['N'] = d.current.N + ' A';
            html += cardHtml('\u0421\u0442\u0440\u0443\u043C, A', cur);
        } else {
            html += cardHtml('\u0421\u0442\u0440\u0443\u043C, A', {
                'I(A)': d.current.A + ' A (' + d.current.A_mA + ' mA)',
                'I(B)': d.current.B + ' A (' + d.current.B_mA + ' mA)'
            });
        }
    }

    // Active power
    if (d.power_active) {
        if (isMtx3) {
            html += cardHtml('\u0410\u043A\u0442\u0438\u0432\u043D\u0430 \u043F\u043E\u0442\u0443\u0436\u043D\u0456\u0441\u0442\u044C, kW', {
                'A': d.power_active.A + ' kW',
                'B': d.power_active.B + ' kW',
                'C': d.power_active.C + ' kW'
            });
        } else {
            html += cardHtml('\u0410\u043A\u0442\u0438\u0432\u043D\u0430 \u043F\u043E\u0442\u0443\u0436\u043D\u0456\u0441\u0442\u044C, kW', {
                'P(A)': d.power_active.A + ' kW',
                'P(B)': d.power_active.B + ' kW'
            });
        }
    }

    // Reactive power
    if (d.power_reactive) {
        if (isMtx3) {
            html += cardHtml('\u0420\u0435\u0430\u043A\u0442\u0438\u0432\u043D\u0430 \u043F\u043E\u0442\u0443\u0436\u043D\u0456\u0441\u0442\u044C, kVar', {
                'A': d.power_reactive.A + ' kVar',
                'B': d.power_reactive.B + ' kVar',
                'C': d.power_reactive.C + ' kVar'
            });
        } else {
            html += cardHtml('\u0420\u0435\u0430\u043A\u0442\u0438\u0432\u043D\u0430 \u043F\u043E\u0442\u0443\u0436\u043D\u0456\u0441\u0442\u044C, kVar', {
                'Q(A)': d.power_reactive.A + ' kVar',
                'Q(B)': d.power_reactive.B + ' kVar'
            });
        }
    }

    // Power factor
    if (d.power_factor) {
        if (isMtx3) {
            var pf = {
                'A': d.power_factor.A,
                'B': d.power_factor.B,
                'C': d.power_factor.C
            };
            if (d.power_factor.total !== undefined) pf['\u0417\u0430\u0433'] = d.power_factor.total;
            html += cardHtml('cos \u03C6', pf);
        } else {
            html += cardHtml('cos \u03C6', {
                'A': d.power_factor.A,
                'B': d.power_factor.B
            });
        }
    }

    // Apparent power (MTX3 extended)
    if (d.apparent_power) {
        var ap = {
            'A': d.apparent_power.A + ' kVA',
            'B': d.apparent_power.B + ' kVA',
            'C': d.apparent_power.C + ' kVA'
        };
        if (d.apparent_power.total !== undefined) ap['\u0417\u0430\u0433'] = d.apparent_power.total + ' kVA';
        html += cardHtml('\u041F\u043E\u0432\u043D\u0430 \u043F\u043E\u0442\u0443\u0436\u043D\u0456\u0441\u0442\u044C, kVA', ap);
    }

    // Frequency, temperature, battery
    var other = {};
    if (d.frequency !== undefined) other['\u0427\u0430\u0441\u0442\u043E\u0442\u0430'] = d.frequency + ' \u0413\u0446';
    if (d.temperature !== undefined) other['\u0422\u0435\u043C\u043F\u0435\u0440\u0430\u0442\u0443\u0440\u0430'] = d.temperature + ' \u00B0C';
    if (d.battery !== undefined) other['\u0411\u0430\u0442\u0430\u0440\u0435\u044F RTC'] = d.battery + ' V';
    if (Object.keys(other).length) {
        html += cardHtml('\u0406\u043D\u0448\u0435', other);
    }

    html += '</div>'; // cards
    return html;
}

function renderInstant(d, header, body) {
    header.textContent = '\u26A1 \u041C\u0438\u0442\u0442\u0454\u0432\u0456 \u0434\u0430\u043D\u0456: ' + d.serial + ' (' + d.type + ') @ ' + d.timestamp;

    var html = actionsBarHtml();

    // Info banner
    html += '<div class="instant-banner">';
    html += '<span class="ib-icon">\u26A1</span>';
    html += '<div>';
    html += '<div class="ib-text">\u041C\u0438\u0442\u0442\u0454\u0432\u0456 \u0434\u0430\u043D\u0456 (\u043F\u0440\u044F\u043C\u0438\u0439 PLC \u0437\u0430\u043F\u0438\u0442)</div>';
    html += '<div class="ib-sub">\u0417\u0447\u0438\u0442\u0430\u043D\u043E \u0437\u0430 ' + d.elapsed + '\u0441 | ' + d.timestamp + '</div>';
    html += '</div>';
    html += '</div>';

    html += renderInstantCards(d);
    html += renderInstantHistory();
    body.innerHTML = html;
}

function loadDailyReport() {
    var date = document.getElementById('reportDate').value;
    if (!date) return;
    CookiePrefs.set('report_date', date);

    var el = document.getElementById('dailyReportResult');
    el.innerHTML = '<div class="status loading">\u0417\u0430\u0432\u0430\u043D\u0442\u0430\u0436\u0435\u043D\u043D\u044F...</div>';

    fetch(LIST_API + '?cmd=daily_report&date=' + date)
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.error) { el.innerHTML = '<div class="status error">' + data.error + '</div>'; return; }

        _reportFilter = 'all';
        _reportSortCol = '';
        _reportSortDir = 'asc';

        renderDailyTable();
    })

function reportFilterChanged() {
    var sel = document.getElementById('reportTypeFilter');
    if (sel) _reportFilter = sel.value;
    renderDailyTable();
}

function reportSortBy(col) {
    if (_reportSortCol === col) {
        if (_reportSortDir === 'asc') _reportSortDir = 'desc';
        else { _reportSortCol = ''; _reportSortDir = 'asc'; }
    } else {
        _reportSortCol = col; _reportSortDir = 'asc';
    }
    renderDailyTable();
}

function reportThHtml(col, label) {
    var arrow = '', cls = 'sortable';
    if (_reportSortCol === col) {
        arrow = _reportSortDir === 'asc' ? ' \u25B2' : ' \u25BC';
        cls += ' sorted';
    }
    return '<th class="' + cls + '" onclick="reportSortBy(\'' + col + '\')">' + label + '<span class="sort-arrow">' + arrow + '</span></th>';
}

function renderDailyTable() {
    if (!_reportData) return;
    var el = document.getElementById('dailyReportResult');
    var list = _reportData.meters.slice();

    // Filter
    if (_reportFilter !== 'all') {
        list = list.filter(function(m) { return m.type === _reportFilter; });
    }

    // Sort
    if (_reportSortCol) {
        list.sort(function(a, b) {
            var va, vb;
            if (_reportSortCol === 'total') { va = a.a_plus.total; vb = b.a_plus.total; }
            else if (_reportSortCol.match(/^t\d$/)) { va = a.a_plus[_reportSortCol]; vb = b.a_plus[_reportSortCol]; }
            else { va = a[_reportSortCol]; vb = b[_reportSortCol]; }
            if (va == null) va = -1; if (vb == null) vb = -1;
            var cmp = (typeof va === 'number') ? va - vb : String(va).localeCompare(String(vb), 'uk');
            return _reportSortDir === 'desc' ? -cmp : cmp;
        });
    }

    var s = _reportData.summary;
    var html = '<div class="report-summary"><b>' + s.with_data + '</b> \u0437\u0456 <b>' + s.total_meters + '</b> \u043B\u0456\u0447\u0438\u043B\u044C\u043D\u0438\u043A\u0456\u0432 (\u043D\u0435\u043C\u0430\u0454 \u0434\u0430\u043D\u0438\u0445: ' + s.missing + ')</div>';

    html += '<div class="report-table-wrap"><table class="result-table">';
    html += '<thead><tr>';
    html += '<th>\u2116</th>';
    html += reportThHtml('address', '\u0410\u0434\u0440\u0435\u0441\u0430');
    html += reportThHtml('serial', '\u0421\u0435\u0440\u0456\u0439\u043D\u0438\u0439');
    html += reportThHtml('type', '\u0422\u0438\u043F');
    html += reportThHtml('t1', 'A+ T1');
    html += reportThHtml('t2', 'A+ T2');
    html += reportThHtml('t3', 'A+ T3');
    html += reportThHtml('t4', 'A+ T4');
    html += reportThHtml('total', 'A+ \u0421\u0443\u043C\u0430');
    html += reportThHtml('fecha', '\u0414\u0430\u0442\u0430 \u0437\u0447\u0438\u0442.');
    html += '</tr></thead><tbody>';

    for (var i = 0; i < list.length; i++) {
        var m = list[i], ap = m.a_plus;
        html += '<tr>';
        html += '<td>' + (i+1) + '</td>';
        html += '<td>' + m.address + '</td>';
        html += '<td style="font-family:monospace;font-size:11px">' + m.serial + '</td>';
        html += '<td>' + m.type + '</td>';
        html += '<td class="num">' + ap.t1.toFixed(1) + '</td>';
        html += '<td class="num">' + ap.t2.toFixed(1) + '</td>';
        html += '<td class="num' + (ap.t3 == null ? ' missing' : '') + '">' + (ap.t3 != null ? ap.t3.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num' + (ap.t4 == null ? ' missing' : '') + '">' + (ap.t4 != null ? ap.t4.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num"><b>' + ap.total.toFixed(1) + '</b></td>';
        html += '<td style="font-size:11px;color:#888">' + (m.fecha || '') + '</td>';
        html += '</tr>';
    }
    html += '</tbody></table></div>';

    el.innerHTML = html;
}

    html += '<div class="settlement-quick-btns">';
    html += '<button class="btn-sm" onclick="settlQuick(\'MTX3\')">\u0412\u0441\u0456 MTX3</button>';
    html += '<button class="btn-sm" onclick="settlQuick(\'MTX1\')">\u0412\u0441\u0456 MTX1</button>';
    html += '<button class="btn-sm" onclick="settlQuick(\'all\')">\u0412\u0441\u0456</button>';
    html += '<button class="btn-sm" onclick="settlQuick(\'clear\')">\u041E\u0447\u0438\u0441\u0442\u0438\u0442\u0438</button>';
    html += '</div>';
    html += '<div class="settlement-status" id="settlStatus"></div>';
    html += '<div id="settlResult"></div>';

    document.getElementById('reportContent').innerHTML = html;
    parseSettlementInput();
}

function parseAddressList(text) {
    var raw = text.replace(/_/g, '').split(/[\s,;]+/).filter(Boolean);
    var seen = {};
    var result = [];
    raw.forEach(function(addr) {
        var clean = addr.replace(/^0+/, '') || '0';
        if (!seen[clean] && /^\d+$/.test(clean)) {
            seen[clean] = true;
            result.push(clean);
        }
    });
    return result;
}

function parseSettlementInput() {
    var ta = document.getElementById('settlMeters');
    var addrs = parseAddressList(ta.value);
    var el = document.getElementById('settlStatus');
    if (addrs.length > 0) {
        el.innerHTML = '\u0420\u043E\u0437\u043F\u0456\u0437\u043D\u0430\u043D\u043E: <b>' + addrs.length + '</b> \u0443\u043D\u0456\u043A\u0430\u043B\u044C\u043D\u0438\u0445 \u0430\u0434\u0440\u0435\u0441';
    } else {
        el.innerHTML = '';
    }
}

function settlQuick(mode) {
    var ta = document.getElementById('settlMeters');
    if (mode === 'clear') { ta.value = ''; parseSettlementInput(); return; }
    var addrs = [];
    meters.forEach(function(m) {
        if (mode === 'all' || m.type === mode) addrs.push(String(m.address));
    });
    ta.value = addrs.join('\n');
    parseSettlementInput();
}

function loadSettlementReport() {
    var month = document.getElementById('settlMonth').value;
    var ta = document.getElementById('settlMeters');
    var addrs = parseAddressList(ta.value);
    if (!addrs.length) { alert('\u0412\u0432\u0435\u0434\u0456\u0442\u044C \u0430\u0434\u0440\u0435\u0441\u0438 \u043B\u0456\u0447\u0438\u043B\u044C\u043D\u0438\u043A\u0456\u0432'); return; }

    fetch(LIST_API + '?cmd=settlement_report&month=' + month + '&meters=' + addrs.join(','))

        html += ' <span class="notfound">(\u043D\u0435 \u0437\u043D\u0430\u0439\u0434\u0435\u043D\u043E: ' + data.not_found.join(', ') + ')</span>';

    html += settlEnergyTds(data.totals.a_plus);

        html += settlEnergyTds(data.totals.a_minus);
        html += settlEnergyTds(data.totals.r_plus);

    html += '<td></td>';

    html += '</tbody></table></div>';

}

function settlEnergyTds(obj) {
    if (!obj) return '<td class="num missing">\u2014</td><td class="num missing">\u2014</td><td class="num missing">\u2014</td><td class="num missing">\u2014</td><td class="num missing">\u2014</td>';

           '<td class="num">' + (obj.t3 ? obj.t3.toFixed(1) : '\u2014') + '</td>' +

function renderMonthlyTable() {
    if (!_monthlyData) return;
    var el = document.getElementById('monthlyResult');

    if (_monthlyFilter !== 'all') {
        list = list.filter(function(m) { return m.type === _monthlyFilter; });
    }

    if (_monthlySortCol) {
        list.sort(function(a, b) {
            var va, vb;
            if (_monthlySortCol === 'consumed_total') { va = a.consumed.total; vb = b.consumed.total; }
            else if (_monthlySortCol === 'start_total') { va = a.start.total; vb = b.start.total; }
            else if (_monthlySortCol === 'end_total') { va = a.end.total; vb = b.end.total; }
            else if (_monthlySortCol.match(/^consumed_t\d$/)) { var k = _monthlySortCol.replace('consumed_',''); va = a.consumed[k]; vb = b.consumed[k]; }
            else if (_monthlySortCol.match(/^start_t\d$/)) { var k = _monthlySortCol.replace('start_',''); va = a.start[k]; vb = b.start[k]; }
            else if (_monthlySortCol.match(/^end_t\d$/)) { var k = _monthlySortCol.replace('end_',''); va = a.end[k]; vb = b.end[k]; }
            else { va = a[_monthlySortCol]; vb = b[_monthlySortCol]; }
            if (va == null) va = -1; if (vb == null) vb = -1;
            var cmp = (typeof va === 'number') ? va - vb : String(va).localeCompare(String(vb), 'uk');
            return _monthlySortDir === 'desc' ? -cmp : cmp;
        });
    }

    var s = _monthlyData.summary;
    var html = '<div class="report-summary"><b>' + s.with_data + '</b> \u0437\u0456 <b>' + s.total_meters + '</b> \u043B\u0456\u0447\u0438\u043B\u044C\u043D\u0438\u043A\u0456\u0432 \u0437\u0456 \u0441\u043F\u043E\u0436\u0438\u0432\u0430\u043D\u043D\u044F\u043C</div>';

    html += monthlyThHtml('type', '\u0422\u0438\u043F');
    html += monthlyThHtml('start_t1', '\u041F\u043E\u0447. T1');
    html += monthlyThHtml('start_t2', '\u041F\u043E\u0447. T2');
    html += monthlyThHtml('end_t1', '\u041A\u0456\u043D. T1');
    html += monthlyThHtml('end_t2', '\u041A\u0456\u043D. T2');
    html += monthlyThHtml('consumed_t1', '\u0421\u043F\u043E\u0436. T1');
    html += monthlyThHtml('consumed_t2', '\u0421\u043F\u043E\u0436. T2');
    html += monthlyThHtml('consumed_total', '\u0421\u0443\u043C\u0430 kWh');
    html += '</tr></thead><tbody>';

    var totC = {t1: 0, t2: 0, total: 0};
    for (var i = 0; i < list.length; i++) {
        var m = list[i], st = m.start, en = m.end, co = m.consumed;
        html += '<tr>';
        html += '<td>' + (i+1) + '</td>';
        html += '<td>' + m.address + '</td>';
        html += '<td style="font-family:monospace;font-size:11px">' + m.serial + '</td>';
        html += '<td>' + m.type + '</td>';
        html += '<td class="num">' + (st ? st.t1.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num">' + (st ? st.t2.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num">' + (en ? en.t1.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num">' + (en ? en.t2.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num">' + (co ? co.t1.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num">' + (co ? co.t2.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num"><b>' + (co ? co.total.toFixed(1) : '\u2014') + '</b></td>';
        html += '</tr>';
        if (co) { totC.t1 += co.t1 || 0; totC.t2 += co.t2 || 0; totC.total += co.total || 0; }
    }

    html += '<tr class="totals-row">';
    html += '<td></td><td></td><td>\u0420\u0410\u0417\u041E\u041C</td><td></td>';
    html += '<td></td><td></td><td></td><td></td>';

function loadComparisonReport() {
    var month = document.getElementById('compMonth').value;
    if (!month) return;
    CookiePrefs.set('settlement_month', month);

    // Calculate previous month
    var parts = month.split('-');
    var y = parseInt(parts[0]), m = parseInt(parts[1]) - 1;
    if (m === 0) { m = 12; y--; }
    var prevMonth = y + '-' + (m < 10 ? '0' : '') + m;

    var el = document.getElementById('compResult');
    el.innerHTML = '<div class="status loading">\u0417\u0430\u0432\u0430\u043D\u0442\u0430\u0436\u0435\u043D\u043D\u044F 2 \u043C\u0456\u0441\u044F\u0446\u0456\u0432...</div>';

    Promise.all([
        fetch(LIST_API + '?cmd=monthly_report&month=' + month).then(function(r) { return r.json(); }),
        fetch(LIST_API + '?cmd=monthly_report&month=' + prevMonth).then(function(r) { return r.json(); })
    ]).then(function(results) {
        var curr = results[0], prev = results[1];
        if (curr.error) { el.innerHTML = '<div class="status error">' + curr.error + '</div>'; return; }

        // Build comparison data
        var prevMap = {};
        if (prev.meters) {
            prev.meters.forEach(function(pm) { prevMap[pm.address] = pm; });
        }

        var rows = [];
        curr.meters.forEach(function(cm) {
            var pm = prevMap[cm.address];
            var currTotal = cm.consumed ? cm.consumed.total : 0;
            var prevTotal = (pm && pm.consumed) ? pm.consumed.total : null;
            var change = (prevTotal != null && prevTotal > 0) ? ((currTotal - prevTotal) / prevTotal * 100) : null;
            var status = '\u041D\u043E\u0440\u043C\u0430';
            var anomaly = false;
            if (!cm.consumed || currTotal === 0) { status = '\u041D\u0435\u043C\u0430\u0454 \u0434\u0430\u043D\u0438\u0445'; }
            else if (currTotal > _compThreshold) { status = '\u0410\u043D\u043E\u043C\u0430\u043B\u0456\u044F'; anomaly = true; }
            else if (change !== null && change > 50) { status = '\u0410\u043D\u043E\u043C\u0430\u043B\u0456\u044F'; anomaly = true; }
            else if (change !== null && change < -100) { status = '\u041D\u0435\u043C\u0430\u0454 \u0434\u0430\u043D\u0438\u0445'; }

            rows.push({
                address: cm.address, serial: cm.serial, type: cm.type,
                consumed_total: currTotal,
                prev_total: prevTotal,
                change: change,
                status: status,
                anomaly: anomaly
            });
        });

        _comparisonData = {month: month, prevMonth: prevMonth, rows: rows, summary: curr.summary};
        _compSortCol = 'consumed_total';
        _compSortDir = 'desc';
        document.getElementById('compExportBtns').style.display = '';
        renderComparisonTable();
    })
    .catch(function(e) { el.innerHTML = '<div class="status error">' + e + '</div>'; });
}

function compFilterChanged() {
    var sel = document.getElementById('compTypeFilter');
    if (sel) _compFilter = sel.value;
    renderComparisonTable();
}

function compThresholdChanged() {
    var inp = document.getElementById('compThreshold');
    if (inp) _compThreshold = parseFloat(inp.value) || 500;
    if (_comparisonData) {
        // Recalculate status
        _comparisonData.rows.forEach(function(r) {
            var status = '\u041D\u043E\u0440\u043C\u0430';
            var anomaly = false;
            if (r.consumed_total === 0) { status = '\u041D\u0435\u043C\u0430\u0454 \u0434\u0430\u043D\u0438\u0445'; }
            else if (r.consumed_total > _compThreshold) { status = '\u0410\u043D\u043E\u043C\u0430\u043B\u0456\u044F'; anomaly = true; }
            else if (r.change !== null && r.change > 50) { status = '\u0410\u043D\u043E\u043C\u0430\u043B\u0456\u044F'; anomaly = true; }
            else if (r.change !== null && r.change < -100) { status = '\u041D\u0435\u043C\u0430\u0454 \u0434\u0430\u043D\u0438\u0445'; }
            r.status = status;
            r.anomaly = anomaly;
        });
        renderComparisonTable();
    }
}

            var va = a[_compSortCol], vb = b[_compSortCol];
            if (va == null) va = -99999; if (vb == null) vb = -99999;
            var cmp = (typeof va === 'number') ? va - vb : String(va).localeCompare(String(vb), 'uk');
            return _compSortDir === 'desc' ? -cmp : cmp;
        });
    }

    var html = '<div class="report-summary">\u041C\u0456\u0441\u044F\u0446\u044C: <b>' + _comparisonData.month + '</b> \u0432\u0441. <b>' + _comparisonData.prevMonth + '</b> | \u041F\u043E\u0440\u0456\u0433: ' + _compThreshold + ' kWh</div>';

    html += '<div class="report-table-wrap"><table class="result-table">';
    html += '<thead><tr>';
    html += '<th>\u2116</th>';
    html += compThHtml('address', '\u0410\u0434\u0440\u0435\u0441\u0430');
    html += compThHtml('serial', '\u0421\u0435\u0440\u0456\u0439\u043D\u0438\u0439');
    html += compThHtml('type', '\u0422\u0438\u043F');
    html += compThHtml('consumed_total', '\u0421\u043F\u043E\u0436\u0438\u0442\u043E kWh');
    html += compThHtml('prev_total', '\u041C\u0438\u043D\u0443\u043B\u0438\u0439 \u043C\u0456\u0441.');
    html += compThHtml('change', '\u0417\u043C\u0456\u043D\u0430 %');
    html += compThHtml('status', '\u0421\u0442\u0430\u0442\u0443\u0441');
    html += '</tr></thead><tbody>';

    for (var i = 0; i < list.length; i++) {
        var r = list[i];
        var rowCls = r.anomaly ? ' class="anomaly-row"' : '';
        html += '<tr' + rowCls + '>';
        html += '<td>' + (i+1) + '</td>';
        html += '<td>' + r.address + '</td>';
        html += '<td style="font-family:monospace;font-size:11px">' + r.serial + '</td>';
        html += '<td>' + r.type + '</td>';
        html += '<td class="num"><b>' + r.consumed_total.toFixed(1) + '</b></td>';
        html += '<td class="num">' + (r.prev_total != null ? r.prev_total.toFixed(1) : '\u2014') + '</td>';
        html += '<td class="num">' + (r.change != null ? r.change.toFixed(1) + '%' : '\u2014') + '</td>';
        var statusCls = r.anomaly ? 'anomaly' : (r.status === '\u041D\u0435\u043C\u0430\u0454 \u0434\u0430\u043D\u0438\u0445' ? 'nodata' : 'ok');
        html += '<td class="status-' + statusCls + '">' + r.status + '</td>';
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    el.innerHTML = html;
}

// ============================================================
// XLSX EXPORT — Pure JS (no dependencies)
// XLSX = ZIP file with XML inside. Uses store method (no compression).
// ============================================================

var MiniXLSX = {
    // Convert array-of-arrays to XLSX and trigger download
    save: function(sheets, filename) {
        var files = this._buildFiles(sheets);
        var zip = this._buildZip(files);
        var blob = new Blob([zip], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    },

    // sheets = [{name: 'Sheet1', data: [[...], [...]]}, ...]
    _buildFiles: function(sheets) {
        var files = {};

        // [Content_Types].xml
        var ct = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">';
        ct += '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>';
        ct += '<Default Extension="xml" ContentType="application/xml"/>';
        ct += '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
        ct += '<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>';
        ct += '<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>';
        for (var i = 0; i < sheets.length; i++)
            ct += '<Override PartName="/xl/worksheets/sheet' + (i+1) + '.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';
        ct += '</Types>';
        files['[Content_Types].xml'] = ct;

        // _rels/.rels
        files['_rels/.rels'] = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';

        // xl/_rels/workbook.xml.rels
        var wbrels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
        for (var i = 0; i < sheets.length; i++)
            wbrels += '<Relationship Id="rId' + (i+1) + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet' + (i+1) + '.xml"/>';
        wbrels += '<Relationship Id="rIdSt" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>';
        wbrels += '<Relationship Id="rIdSS" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>';
        wbrels += '</Relationships>';
        files['xl/_rels/workbook.xml.rels'] = wbrels;

        // xl/workbook.xml
        var wb = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>';
        for (var i = 0; i < sheets.length; i++)
            wb += '<sheet name="' + this._escXml(sheets[i].name) + '" sheetId="' + (i+1) + '" r:id="rId' + (i+1) + '"/>';
        wb += '</sheets></workbook>';
        files['xl/workbook.xml'] = wb;

        // xl/styles.xml — minimal: bold style for header row
        files['xl/styles.xml'] = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">' +
            '<fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><name val="Calibri"/></font></fonts>' +
            '<fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills>' +
            '<borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>' +
            '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>' +
            '<cellXfs count="2"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/></cellXfs>' +
            '</styleSheet>';

        // Build shared strings and worksheets
        var sst = [];
        var sstMap = {};
        function getSST(s) {
            if (sstMap.hasOwnProperty(s)) return sstMap[s];
            var idx = sst.length;
            sst.push(s);
            sstMap[s] = idx;
            return idx;
        }

        for (var si = 0; si < sheets.length; si++) {
            var data = sheets[si].data;
            var ws = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
            for (var r = 0; r < data.length; r++) {
                var row = data[r];
                ws += '<row r="' + (r+1) + '">';
                for (var c = 0; c < row.length; c++) {
                    var ref = this._colRef(c) + (r+1);
                    var v = row[c];
                    var style = (r === 0) ? ' s="1"' : '';
                    if (v == null) {
                        ws += '<c r="' + ref + '"' + style + '/>';
                    } else if (typeof v === 'number') {
                        ws += '<c r="' + ref + '"' + style + '><v>' + v + '</v></c>';
                    } else {
                        var idx = getSST(String(v));
                        ws += '<c r="' + ref + '" t="s"' + style + '><v>' + idx + '</v></c>';
                    }
                }
                ws += '</row>';
            }
            ws += '</sheetData></worksheet>';
            files['xl/worksheets/sheet' + (si+1) + '.xml'] = ws;
        }

        // xl/sharedStrings.xml
        var ssXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="' + sst.length + '" uniqueCount="' + sst.length + '">';
        for (var i = 0; i < sst.length; i++)
            ssXml += '<si><t>' + this._escXml(sst[i]) + '</t></si>';
        ssXml += '</sst>';
        files['xl/sharedStrings.xml'] = ssXml;

        return files;
    },

    _escXml: function(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    },

    _colRef: function(c) {
        var s = '';
        c++;
        while (c > 0) { c--; s = String.fromCharCode(65 + (c % 26)) + s; c = Math.floor(c / 26); }
        return s;
    },

    // Build ZIP file (store method, no compression)
    _buildZip: function(files) {
        var encoder = new TextEncoder();
        var entries = [];
        var centralDir = [];
        var offset = 0;

        var names = Object.keys(files);
        for (var i = 0; i < names.length; i++) {
            var name = names[i];
            var content = encoder.encode(files[name]);
            var nameBytes = encoder.encode(name);
            var crc = this._crc32(content);

            // Local file header (30 + name + content)
            var lfh = new Uint8Array(30 + nameBytes.length + content.length);
            var dv = new DataView(lfh.buffer);
            dv.setUint32(0, 0x04034b50, true); // signature
            dv.setUint16(4, 20, true);          // version needed
            dv.setUint16(6, 0, true);           // flags
            dv.setUint16(8, 0, true);           // compression: store
            dv.setUint16(10, 0, true);          // mod time
            dv.setUint16(12, 0, true);          // mod date
            dv.setUint32(14, crc, true);        // crc32
            dv.setUint32(18, content.length, true); // compressed size
            dv.setUint32(22, content.length, true); // uncompressed size
            dv.setUint16(26, nameBytes.length, true); // name length
            dv.setUint16(28, 0, true);          // extra length
            lfh.set(nameBytes, 30);
            lfh.set(content, 30 + nameBytes.length);
            entries.push(lfh);

            // Central directory header (46 + name)
            var cdh = new Uint8Array(46 + nameBytes.length);
            var cv = new DataView(cdh.buffer);
            cv.setUint32(0, 0x02014b50, true);
            cv.setUint16(4, 20, true);
            cv.setUint16(6, 20, true);
            cv.setUint16(8, 0, true);
            cv.setUint16(10, 0, true);
            cv.setUint16(12, 0, true);
            cv.setUint16(14, 0, true);
            cv.setUint32(16, crc, true);
            cv.setUint32(20, content.length, true);
            cv.setUint32(24, content.length, true);
            cv.setUint16(28, nameBytes.length, true);
            cv.setUint16(30, 0, true);
            cv.setUint16(32, 0, true);
            cv.setUint16(34, 0, true);
            cv.setUint16(36, 0, true);
            cv.setUint32(38, 0, true);
            cv.setUint32(42, offset, true);
            cdh.set(nameBytes, 46);
            centralDir.push(cdh);

            offset += lfh.length;
        }

        var cdOffset = offset;
        var cdSize = 0;
        centralDir.forEach(function(cd) { cdSize += cd.length; });

        // End of central directory (22 bytes)
        var eocd = new Uint8Array(22);
        var ev = new DataView(eocd.buffer);
        ev.setUint32(0, 0x06054b50, true);
        ev.setUint16(4, 0, true);
        ev.setUint16(6, 0, true);
        ev.setUint16(8, names.length, true);
        ev.setUint16(10, names.length, true);
        ev.setUint32(12, cdSize, true);
        ev.setUint32(16, cdOffset, true);
        ev.setUint16(20, 0, true);

        var parts = entries.concat(centralDir, [eocd]);
        var total = 0;
        parts.forEach(function(p) { total += p.length; });
        var result = new Uint8Array(total);
        var pos = 0;
        parts.forEach(function(p) { result.set(p, pos); pos += p.length; });
        return result;
    },

    _crc32: function(buf) {
        if (!this._crcTable) {
            var t = [];
            for (var n = 0; n < 256; n++) {
                var c = n;
                for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                t[n] = c;
            }
            this._crcTable = t;
        }
        var crc = 0xFFFFFFFF;
        for (var i = 0; i < buf.length; i++) crc = this._crcTable[(crc ^ buf[i]) & 0xFF] ^ (crc >>> 8);
        return (crc ^ 0xFFFFFFFF) >>> 0;
    }
};

function exportReportXlsx() {

    if (_reportFilter !== 'all') list = list.filter(function(m) { return m.type === _reportFilter; });

    var ws_data = [
        ['\u2116', '\u0410\u0434\u0440\u0435\u0441\u0430', '\u0421\u0435\u0440\u0456\u0439\u043D\u0438\u0439 \u043D\u043E\u043C\u0435\u0440', '\u0422\u0438\u043F', 'A+ T1 (kWh)', 'A+ T2 (kWh)', 'A+ T3 (kWh)', 'A+ T4 (kWh)', 'A+ \u0421\u0443\u043C\u0430 (kWh)', '\u0414\u0430\u0442\u0430 \u0437\u0447\u0438\u0442\u0443\u0432\u0430\u043D\u043D\u044F']
    ];
    for (var i = 0; i < list.length; i++) {
        var m = list[i], ap = m.a_plus;
        ws_data.push([i+1, m.address, m.serial, m.type, ap.t1, ap.t2, ap.t3, ap.t4, ap.total, m.fecha]);
    }

    var s = _reportData.summary;

        ['\u0414\u0430\u0442\u0430', _reportData.date],

        ['\u0411\u0435\u0437 \u0434\u0430\u043D\u0438\u0445', s.missing]
    ];

    MiniXLSX.save([
        {name: '\u041F\u043E\u043A\u0430\u0437\u043D\u0438\u043A\u0438', data: ws_data},
        {name: '\u041F\u0456\u0434\u0441\u0443\u043C\u043E\u043A', data: ws2_data}
    ], 'OSBB_pokaznyky_' + _reportData.date + '.xlsx');
}

function exportSettlementXlsx() {
    if (!_settlementData) return;
    var data = _settlementData;
    var hasMtx3 = data.meters.some(function(m) { return m.type === 'MTX3'; });

    var headers = ['\u2116', '\u0410\u0434\u0440\u0435\u0441\u0430', '\u0421\u0435\u0440\u0456\u0439\u043D\u0438\u0439', '\u0422\u0438\u043F',
                   'A+ T1', 'A+ T2', 'A+ T3', 'A+ T4', 'A+ \u0421\u0443\u043C\u0430'];
    if (hasMtx3) {
        headers = headers.concat(['A- T1','A- T2','A- T3','A- T4','A- \u0421\u0443\u043C\u0430',
                                   'R+ T1','R+ T2','R+ T3','R+ T4','R+ \u0421\u0443\u043C\u0430',
                                   'R- T1','R- T2','R- T3','R- T4','R- \u0421\u0443\u043C\u0430']);
    }
    headers.push('\u0414\u0430\u0442\u0430');

    var ws_data = [headers];
    function energyCols(obj) {
        if (!obj) return [null, null, null, null, null];
        return [obj.t1, obj.t2, obj.t3, obj.t4, obj.total];
    }

    for (var i = 0; i < data.meters.length; i++) {
        var m = data.meters[i];
        var row = [i+1, m.address, m.serial, m.type].concat(energyCols(m.a_plus));
        if (hasMtx3) row = row.concat(energyCols(m.a_minus), energyCols(m.r_plus), energyCols(m.r_minus));
        row.push(m.fecha);
        ws_data.push(row);
    }

    var totRow = ['', '', '\u0420\u0410\u0417\u041E\u041C', ''].concat(energyCols(data.totals.a_plus));
    if (hasMtx3) totRow = totRow.concat(energyCols(data.totals.a_minus), energyCols(data.totals.r_plus), energyCols(data.totals.r_minus));
    totRow.push('');
    ws_data.push(totRow);

    MiniXLSX.save([
        {name: '\u0412\u0437\u0430\u0454\u043C\u043E\u0440\u043E\u0437\u0440\u0430\u0445\u0443\u043D\u043A\u0438', data: ws_data}
    ], 'OSBB_vzajemoroz_' + data.month + '.xlsx');
}

            var co = m.consumed;
            return {address: m.address, serial: m.serial, type: m.type,
                    t1: co ? co.t1 : null, t2: co ? co.t2 : null,
                    t3: co ? co.t3 : null, t4: co ? co.t4 : null,
                    sum: co ? co.total : null, fecha: m.end ? m.end.fecha : null};
        });
    } else if (_reportData) {
        _csvExportData = _reportData.meters.map(function(m) {
            return {address: m.address, serial: m.serial, type: m.type,
                    t1: m.a_plus.t1, t2: m.a_plus.t2, t3: m.a_plus.t3, t4: m.a_plus.t4,
                    sum: m.a_plus.total, fecha: m.fecha};
        });
    } else { return; }

    // Populate checkboxes
    var savedFields = CookiePrefs.get('csv_fields');
    var cbHtml = '';
    _csvColumns.forEach(function(col) {
        var checked = savedFields.indexOf(col.key) >= 0 ? ' checked' : '';
        cbHtml += '<label><input type="checkbox" value="' + col.key + '"' + checked + ' onchange="updateCsvPreview()"> ' + col.label + '</label>';
    });
    document.getElementById('csvFields').innerHTML = cbHtml;

    // Set radio values from cookies
    var savedDelim = CookiePrefs.get('csv_delimiter');
    var savedEnc = CookiePrefs.get('csv_encoding');
    document.querySelectorAll('input[name="csvDelim"]').forEach(function(r) { r.checked = r.value === savedDelim; });
    document.querySelectorAll('input[name="csvEnc"]').forEach(function(r) { r.checked = r.value === savedEnc; });

    updateCsvPreview();
    document.getElementById('csvModal').classList.add('open');
}

function closeCsvModal() {
    document.getElementById('csvModal').classList.remove('open');
}

function getCsvSelectedFields() {
    var fields = [];
    document.querySelectorAll('#csvFields input[type="checkbox"]:checked').forEach(function(cb) {
        fields.push(cb.value);
    });
    return fields;
}

function getCsvDelimiter() {
    var r = document.querySelector('input[name="csvDelim"]:checked');
    return r ? (r.value === 'tab' ? '\t' : r.value) : ';';
}

function getCsvEncoding() {
    var r = document.querySelector('input[name="csvEnc"]:checked');
    return r ? r.value : 'UTF-8';
}

function updateCsvPreview() {
    var fields = getCsvSelectedFields();
    var delim = getCsvDelimiter();
    var preview = '';
    var count = Math.min(5, _csvExportData ? _csvExportData.length : 0);
    for (var i = 0; i < count; i++) {
        var row = _csvExportData[i];
        var vals = fields.map(function(f) {
            var v = row[f];
            return v != null ? String(v) : '';
        });
        preview += vals.join(delim) + '\n';
    }
    document.getElementById('csvPreview').textContent = preview || '(\u043E\u0431\u0435\u0440\u0456\u0442\u044C \u043F\u043E\u043B\u044F)';
}

function utf8toWin1251(str) {
    var result = [];
    for (var i = 0; i < str.length; i++) {
        var code = str.charCodeAt(i);
        if (code < 128) { result.push(code); }
        else if (code >= 0x0410 && code <= 0x042F) { result.push(code - 0x0410 + 0xC0); } // А-Я
        else if (code >= 0x0430 && code <= 0x044F) { result.push(code - 0x0430 + 0xE0); } // а-я
        else if (code === 0x0406) { result.push(0xB2); } // І
        else if (code === 0x0456) { result.push(0xB3); } // і
        else if (code === 0x0407) { result.push(0xAF); } // Ї
        else if (code === 0x0457) { result.push(0xBF); } // ї
        else if (code === 0x0404) { result.push(0xAA); } // Є
        else if (code === 0x0454) { result.push(0xBA); } // є
        else if (code === 0x0490) { result.push(0xA5); } // Ґ
        else if (code === 0x0491) { result.push(0xB4); } // ґ
        else if (code === 0x0401) { result.push(0xA8); } // Ё
        else if (code === 0x0451) { result.push(0xB8); } // ё
        else if (code === 0x2116) { result.push(0xB9); } // №
        else { result.push(0x3F); } // ?
    }
    return new Uint8Array(result);
}

function downloadCsv() {
    var fields = getCsvSelectedFields();
    var delim = getCsvDelimiter();
    var enc = getCsvEncoding();

    // Save preferences
    CookiePrefs.set('csv_fields', fields);
    CookiePrefs.set('csv_delimiter', delim === '\t' ? 'tab' : delim);
    CookiePrefs.set('csv_encoding', enc);

    // Build CSV content
    var lines = [];
    // Header
    var headerCols = fields.map(function(f) {
        var col = _csvColumns.find(function(c) { return c.key === f; });
        return col ? col.label : f;
    });
    lines.push(headerCols.join(delim));

    // Data rows
    _csvExportData.forEach(function(row) {
        var vals = fields.map(function(f) {
            var v = row[f];
            return v != null ? String(v) : '';
        });
        lines.push(vals.join(delim));
    });

    var csvText = lines.join('\r\n') + '\r\n';
    var blob;
    if (enc === 'Windows-1251') {
        blob = new Blob([utf8toWin1251(csvText)], {type: 'text/csv;charset=windows-1251'});
    } else {
        blob = new Blob(['\uFEFF' + csvText], {type: 'text/csv;charset=utf-8'});
    }

    var dateStr = (_reportType === 'settlement' && _settlementData) ? _settlementData.month : (_reportType === 'monthly' && _monthlyData) ? _monthlyData.month : (_reportData ? _reportData.date : 'export');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'OSBB_export_' + dateStr + '.csv';
    a.click();
    URL.revokeObjectURL(a.href);

    closeCsvModal();
}

</script>
